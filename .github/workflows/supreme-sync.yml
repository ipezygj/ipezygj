name: Supreme-Sync QA

on:
  push:
    branches: [ main ]
  pull_request:
    branches: [ main ]

jobs:
  qa_validation:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v3

      - name: Set up Python
        uses: actions/setup-python@v4
        with:
          python-version: '3.10'

      - name: Ferrari Logic Linting (Black & PEP8)
        run: |
          pip install black isort
          black --check --line-length 120 .
          isort --check-only .

